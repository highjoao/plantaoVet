<style>
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px #1a1c1b;
        }
        .neo-shadow-btn {
            box-shadow: 4px 4px 0px 0px #1a1c1b;
            transition: all 0.1s ease-in-out;
        }
        .neo-shadow-btn:active {
            box-shadow: 0px 0px 0px 0px #1a1c1b;
            transform: translate(4px, 4px);
        }
        .bg-pattern {
            background-image: radial-gradient(#1a1c1b 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #c7ebdd;
        }

        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        @media (prefers-reduced-motion: no-preference) {
            .animate-pop-in {
                animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
                opacity: 0;
            }
            .btn-shine {
                position: relative;
                overflow: hidden;
            }
            .btn-shine::after {
                content: '';
                position: absolute;
                top: -50%;
                left: -50%;
                width: 200%;
                height: 200%;
                background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
                transform: rotate(30deg) translate(-50%, -50%);
                animation: shine 4s infinite;
            }
            
            @keyframes popIn {
                0% { transform: scale(0.85); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            @keyframes shine {
                0% { left: -100%; }
                20% { left: 100%; }
                100% { left: 100%; }
            }
            .particle {
                position: absolute;
                pointer-events: none;
                animation: floatUp linear infinite;
                opacity: 0.6;
            }
            @keyframes floatUp {
                0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
                10% { opacity: 0.8; }
                90% { opacity: 0.8; }
                100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .animate-pop-in {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>

<script>
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        const container = document.getElementById('particles-container');
        const elements = ['sparkles', 'favorite', 'pets'];
        const colors = ['#F7CFE1', '#FFF3C7', '#FF7A45'];
        
        function createParticle() {
            const el = document.createElement('span');
            el.className = 'particle material-symbols-outlined';
            el.style.fontVariationSettings = "'FILL' 1";
            el.textContent = elements[Math.floor(Math.random() * elements.length)];
            el.style.left = (Math.random() * 90 + 5) + 'vw';
            el.style.fontSize = (Math.random() * 14 + 12) + 'px';
            el.style.color = colors[Math.floor(Math.random() * colors.length)];
            el.style.animationDuration = (Math.random() * 15 + 15) + 's';
            el.style.animationDelay = '-' + (Math.random() * 30) + 's';
            
            container.appendChild(el);
            
            setTimeout(() => {
                if (el.parentNode) el.parentNode.removeChild(el);
            }, 30000);
        }

        // Initialize particles
        for(let i=0; i<20; i++) {
            createParticle();
        }
        
        setInterval(createParticle, 1500);
    }
</script>
