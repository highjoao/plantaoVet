<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plantão Vet - Handover Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&amp;family=Space+Grotesk:wght@700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "on-surface": "#1a1c1b",
                            "secondary-fixed-dim": "#e3bcce",
                            "inverse-primary": "#abcec1",
                            "on-background": "#1a1c1b",
                            "primary-fixed-dim": "#abcec1",
                            "background": "#faf9f7",
                            "surface-variant": "#e3e2e0",
                            "on-surface-variant": "#414845",
                            "on-primary-fixed": "#002018",
                            "inverse-surface": "#2f3130",
                            "secondary-fixed": "#ffd8e9",
                            "on-secondary-fixed-variant": "#5b3e4d",
                            "surface-dim": "#dadad8",
                            "on-error-container": "#93000a",
                            "surface-container-highest": "#e3e2e0",
                            "on-secondary": "#ffffff",
                            "on-primary-fixed-variant": "#2d4d43",
                            "tertiary": "#665e3c",
                            "error-container": "#ffdad6",
                            "surface-container-lowest": "#ffffff",
                            "on-primary": "#ffffff",
                            "surface": "#faf9f7",
                            "on-error": "#ffffff",
                            "error": "#ba1a1a",
                            "surface-bright": "#faf9f7",
                            "outline-variant": "#c1c8c4",
                            "on-tertiary": "#ffffff",
                            "inverse-on-surface": "#f1f1ef",
                            "surface-container-low": "#f4f4f1",
                            "outline": "#717975",
                            "secondary": "#745665",
                            "primary": "#44655a",
                            "on-tertiary-container": "#6d6542",
                            "primary-fixed": "#c6eadc",
                            "primary-container": "#c7ebdd",
                            "surface-container": "#eeeeec",
                            "tertiary-container": "#efe3b8",
                            "on-secondary-fixed": "#2b1421",
                            "on-tertiary-fixed-variant": "#4e4727",
                            "on-tertiary-fixed": "#211b02",
                            "secondary-container": "#fdd5e7",
                            "tertiary-fixed": "#eee3b7",
                            "surface-container-high": "#e8e8e6",
                            "surface-tint": "#44655a",
                            "on-secondary-container": "#795a69",
                            "on-primary-container": "#4b6b60",
                            "tertiary-fixed-dim": "#d1c79d",
                            // Custom brand colors based on guidance
                            "brand-mint": "#98FFD1",
                            "brand-pink": "#FFA6C9",
                            "brand-yellow": "#FFF59D",
                            "brand-orange": "#FF8A65",
                            "brand-offwhite": "#FFFDF7",
                            "brand-dark": "#2D2D2D"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.125rem",
                            "lg": "0.25rem",
                            "xl": "0.5rem",
                            "full": "0.75rem"
                    },
                    "spacing": {
                            "gutter": "12px",
                            "container-padding": "16px",
                            "unit": "4px",
                            "offset-shadow": "4px"
                    },
                    "fontFamily": {
                            "headline-sm": ["Space Grotesk", "sans-serif"],
                            "headline-lg": ["Space Grotesk", "sans-serif"],
                            "body-lg": ["Quicksand", "sans-serif"],
                            "headline-md": ["Space Grotesk", "sans-serif"],
                            "pixel-data": ["Space Mono", "monospace"],
                            "label-caps": ["Space Mono", "monospace"],
                            "body-md": ["Quicksand", "sans-serif"]
                    },
                    "fontSize": {
                            "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-1px", "fontWeight": "700"}],
                            "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "500"}],
                            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                            "pixel-data": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                            "label-caps": ["12px", {"lineHeight": "16px", "fontWeight": "700"}],
                            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "500"}]
                    },
                    "borderWidth": {
                        "3": "3px"
                    },
                    "boxShadow": {
                        "brutal": "4px 4px 0px 0px #2D2D2D",
                        "brutal-active": "0px 0px 0px 0px #2D2D2D",
                        "brutal-nav": "4px 4px 0px 0px rgba(26,28,27,1)"
                    },
                    "animation": {
                        "pop-in": "popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards",
                        "pulse-subtle": "pulseSubtle 2s infinite ease-in-out",
                        "float-1": "floatAnim 6s ease-in-out infinite",
                        "float-2": "floatAnim 8s ease-in-out infinite reverse",
                        "sparkle": "sparkleAnim 1.5s infinite"
                    },
                    "keyframes": {
                        "popIn": {
                            "0%": { opacity: "0", transform: "translateY(20px) scale(0.95)" },
                            "100%": { opacity: "1", transform: "translateY(0) scale(1)" }
                        },
                        "pulseSubtle": {
                            "0%, 100%": { transform: "scale(1)" },
                            "50%": { transform: "scale(1.02)" }
                        },
                        "floatAnim": {
                            "0%, 100%": { transform: "translateY(0) rotate(0deg)" },
                            "50%": { transform: "translateY(-15px) rotate(10deg)" }
                        },
                        "sparkleAnim": {
                            "0%, 100%": { opacity: "0", transform: "scale(0.5)" },
                            "50%": { opacity: "1", transform: "scale(1.2)" }
                        }
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.brand-mint');
        }
        
        .input-brutal {
            background-color: theme('colors.brand-offwhite');
            border: 3px solid theme('colors.brand-dark');
            padding: 12px;
            min-height: 48px; /* tactile padding */
            font-family: theme('fontFamily.pixel-data');
            font-size: 14px;
            color: theme('colors.on-surface');
            width: 100%;
            transition: all 0.2s;
            box-shadow: 4px 4px 0px 0px theme('colors.brand-dark');
            border-radius: theme('borderRadius.DEFAULT');
        }
        
        .input-brutal:focus {
            outline: none;
            border-color: theme('colors.primary');
        }

        .btn-brutal {
            border: 3px solid theme('colors.brand-dark');
            box-shadow: 4px 4px 0px 0px theme('colors.brand-dark');
            min-height: 48px;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: theme('borderRadius.DEFAULT');
        }

        .btn-brutal:active {
            transform: translate(4px, 4px) !important;
            box-shadow: 0px 0px 0px 0px theme('colors.brand-dark');
        }
        
        .window-card {
            border: 3px solid theme('colors.brand-dark');
            box-shadow: 4px 4px 0px 0px theme('colors.brand-dark');
            background: theme('colors.brand-offwhite');
            margin-bottom: 24px;
            border-radius: theme('borderRadius.DEFAULT');
            overflow: hidden;
            opacity: 0;
        }

        .window-title {
            border-bottom: 3px solid theme('colors.brand-dark');
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-surface pb-32 relative"> <!-- pb-32 for sticky bottom bar -->
<!-- Background Particles -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden opacity-[0.15]">
<div class="absolute top-[10%] left-[5%] animate-float-1 text-brand-dark"><span class="material-symbols-outlined text-4xl">favorite</span></div>
<div class="absolute top-[30%] right-[10%] animate-float-2 text-brand-dark"><span class="material-symbols-outlined text-5xl">pets</span></div>
<div class="absolute top-[60%] left-[15%] animate-float-2 text-brand-dark"><span class="material-symbols-outlined text-3xl">pets</span></div>
<div class="absolute bottom-[20%] right-[5%] animate-float-1 text-brand-dark"><span class="material-symbols-outlined text-4xl">favorite</span></div>
<div class="absolute top-[80%] left-[40%] animate-float-1 text-brand-dark" style="animation-delay: 1s;"><span class="material-symbols-outlined text-2xl">pets</span></div>
</div>
<!-- TopAppBar -->
<header class="bg-secondary dark:bg-secondary-fixed-dim text-on-secondary dark:text-on-secondary-fixed font-headline-sm text-headline-sm docked full-width top-0 z-50 border-b-3 border-on-surface dark:border-inverse-surface shadow-[4px_4px_0px_0px_rgba(26,28,27,1)] flex justify-between items-center w-full px-container-padding h-16 sticky">
<button class="flex items-center justify-center p-2 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<span class="font-pixel-data text-headline-sm text-on-secondary dark:text-on-secondary-fixed uppercase tracking-widest">PLANTÃO_VET.EXE</span>
<button class="flex items-center justify-center p-2 hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="p-container-padding max-w-2xl mx-auto mt-4">
<!-- 1. Identificação -->
<div class="window-card animate-pop-in" style="animation-delay: 0.1s;">
<div class="window-title bg-brand-pink text-brand-dark">
<span class="material-symbols-outlined">badge</span>
<h2 class="font-headline-sm text-headline-sm m-0">Identificação</h2>
<div class="ml-auto flex gap-1">
<div class="w-3 h-3 border-2 border-brand-dark rounded-full bg-white"></div>
<div class="w-3 h-3 border-2 border-brand-dark rounded-full bg-white"></div>
</div>
</div>
<div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Nome do Paciente</label>
<input class="input-brutal" placeholder="Ex: Rex" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Tutor</label>
<input class="input-brutal" placeholder="Ex: Maria" type="text"/>
</div>
<div class="grid grid-cols-2 gap-2">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Espécie</label>
<select class="input-brutal bg-brand-offwhite">
<option>Canina</option>
<option>Felina</option>
<option>Outra</option>
</select>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Raça</label>
<input class="input-brutal" placeholder="Ex: SRD" type="text"/>
</div>
</div>
<div class="grid grid-cols-2 gap-2">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Peso (kg)</label>
<input class="input-brutal" placeholder="0.0" step="0.1" type="number"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Leito</label>
<input class="input-brutal" placeholder="A1" type="text"/>
</div>
</div>
</div>
</div>
<!-- 2. Quadro Clínico -->
<div class="window-card animate-pop-in" style="animation-delay: 0.3s;">
<div class="window-title bg-brand-yellow text-brand-dark">
<span class="material-symbols-outlined">medical_services</span>
<h2 class="font-headline-sm text-headline-sm m-0">Quadro Clínico</h2>
</div>
<div class="p-4 flex flex-col gap-4">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Motivo da Internação</label>
<textarea class="input-brutal min-h-[80px]" placeholder="Descreva brevemente..."></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Estado Geral</label>
<select class="input-brutal">
<option>Estável</option>
<option>Grave</option>
<option>Crítico</option>
</select>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Nível de Consciência</label>
<select class="input-brutal">
<option>Alerta</option>
<option>Apático</option>
<option>Comatoso</option>
</select>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">Escore de Dor</label>
<select class="input-brutal">
<option>0 - Sem dor</option>
<option>1 - Leve</option>
<option>2 - Moderada</option>
<option>3 - Intensa</option>
</select>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Bar (Form Actions) -->
<div class="fixed bottom-0 left-0 w-full bg-surface dark:bg-surface-dim border-t-3 border-on-surface p-4 flex gap-4 z-50">
<button class="btn-brutal flex-1 bg-surface-container-lowest text-on-surface font-headline-sm text-headline-sm">
                Limpar
            </button>
<button class="btn-brutal flex-[2] bg-brand-orange text-brand-dark font-headline-sm text-headline-sm animate-pulse-subtle relative group overflow-hidden">
<span class="absolute top-2 left-4 text-xs animate-sparkle" style="animation-delay: 0.2s;">✨</span>
<span class="absolute bottom-2 right-4 text-sm animate-sparkle" style="animation-delay: 0.7s;">✨</span>
<span class="absolute top-1/2 left-1/2 text-xs animate-sparkle" style="animation-delay: 1.1s;">✨</span>
<span class="material-symbols-outlined mr-2 relative z-10">send</span>
<span class="relative z-10">Gerar Mensagem</span>
</button>
</div>
</main>
</body></html>
